name: تلگرام دانلودر (نسخه بهینه شده)

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 Telegram post link'
        required: true
        type: string
      split_threshold_mb:
        description: '📦 Maximum file size per part (MB)'
        required: false
        type: number
        default: 90

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip python3 python3-pip

      - name: 🐍 Install Python dependencies
        run: pip3 install requests

      - name: 📝 Create Optimized Downloader Script
        run: |
          cat > telegram_downloader.py << 'EOF'
          #!/usr/bin/env python3
          import requests
          import sys
          import time
          from pathlib import Path

          def download_with_resume(url, output_path, headers, max_retries=100, chunk_size=16*1024):
              output_path = Path(output_path)
              output_path.parent.mkdir(parents=True, exist_ok=True)
              temp_path = output_path.with_suffix(output_path.suffix + ".partial")
              
              downloaded = temp_path.stat().st_size if temp_path.exists() else 0
              session = requests.Session()
              session.headers.update(headers)
              
              for attempt in range(max_retries):
                  try:
                      # افزایش زمان تایم‌اوت به ۱۰ دقیقه برای پایداری بیشتر
                      range_header = {"Range": f"bytes={downloaded}-"} if downloaded > 0 else {}
                      resp = session.get(url, stream=True, timeout=600, headers=range_header)
                      
                      # اگر سرور از رنج پشتیبانی نکنه، دوباره از صفر شروع میکنیم
                      if downloaded > 0 and resp.status_code != 206:
                          print("\n⚠️ Server doesn't support resume. Restarting from 0...")
                          downloaded = 0
                          temp_path.unlink(missing_ok=True)
                          resp = session.get(url, stream=True, timeout=600)

                      resp.raise_for_status()
                      total_size = int(resp.headers.get('content-length', 0)) + downloaded
                      
                      mode = 'ab' if downloaded > 0 else 'wb'
                      with open(temp_path, mode) as f:
                          for chunk in resp.iter_content(chunk_size=chunk_size):
                              if chunk:
                                  f.write(chunk)
                                  downloaded += len(chunk)
                                  if total_size > 0:
                                      percent = (downloaded / total_size) * 100
                                      print(f"\r🚀 Progress: {percent:.2f}% ({downloaded}/{total_size} bytes)", end='', flush=True)
                      
                      print()
                      temp_path.rename(output_path)
                      return True
                  except Exception as e:
                      wait_time = min(2 ** (attempt % 6), 30) # انتظار بین ۲ تا ۳۰ ثانیه
                      print(f"\n⚠️ Connection issue ({e}). Retrying in {wait_time}s... (Attempt {attempt+1}/{max_retries})")
                      time.sleep(wait_time)
              return False

          def get_link(telegram_link):
              api_url = "https://telegramdownloader.net/proxy.php"
              headers = {"User-Agent": "Mozilla/5.0"}
              try:
                  resp = requests.post(api_url, headers=headers, data={"telegram_link": telegram_link}, timeout=60)
                  result = resp.json()
                  data = result.get('data', {}).get('data', {})
                  return data.get('link'), data.get('file_name')
              except:
                  return None, None

          if __name__ == "__main__":
              link = sys.argv[1]
              out_dir = sys.argv[2]
              raw_url, file_name = get_link(link)
              if raw_url and file_name:
                  out_path = Path(out_dir) / file_name
                  print(f"📁 Downloading: {file_name}")
                  success = download_with_resume(raw_url, out_path, {"User-Agent": "Mozilla/5.0"})
                  if success:
                      with open(Path(out_dir) / ".download_info", "w") as info:
                          info.write(f"{file_name}\n{out_path.stat().st_size}")
                      sys.exit(0)
              sys.exit(1)
          EOF

      - name: 📥 Download with Optimized Script
        id: download
        run: |
          mkdir -p downloads
          python3 telegram_downloader.py "${{ github.event.inputs.telegram_link }}" downloads
          if [ -f downloads/.download_info ]; then
            echo "downloaded_name=$(head -n1 downloads/.download_info)" >> $GITHUB_OUTPUT
            echo "file_size=$(tail -n1 downloads/.download_info)" >> $GITHUB_OUTPUT
            rm downloads/.download_info
          else
            exit 1
          fi

      - name: ✂️ Split & Sanitize
        run: |
          cd downloads
          FILENAME="${{ steps.download.outputs.downloaded_name }}"
          THRESHOLD="${{ github.event.inputs.split_threshold_mb }}"
          LIMIT=$((THRESHOLD * 1024 * 1024))
          if [ "$THRESHOLD" != "0" ] && [ "$(stat -c%s "$FILENAME")" -gt "$LIMIT" ]; then
            zip -s "${THRESHOLD}m" "${FILENAME}.zip" "$FILENAME"
            rm "$FILENAME"
          fi
          # پاکسازی نام فایل
          for f in *; do mv "$f" "$(echo "$f" | sed 's/[^a-zA-Z0-9._-]/_/g')"; done

      - name: 📤 Push to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Optimized Download: ${{ steps.download.outputs.downloaded_name }}"
          git push origin main
